
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>盛开的郁金香</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #06060f;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #canvas-container {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(180, 140, 100, 0.08), 0 0 120px rgba(100, 80, 60, 0.04);
    }
    canvas { display: block; }

    /* 录制按钮 */
    #recordBtn {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 26px;
      border: 1px solid rgba(255, 210, 170, 0.35);
      border-radius: 24px;
      background: rgba(16, 14, 24, 0.88);
      color: rgba(255, 210, 170, 0.8);
      font-size: 14px;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.35s ease;
      z-index: 100;
      letter-spacing: 0.05em;
      user-select: none;
      outline: none;
    }
    #recordBtn:hover {
      border-color: rgba(255, 210, 170, 0.65);
      color: rgba(255, 220, 185, 1);
      background: rgba(28, 22, 38, 0.92);
      box-shadow: 0 0 24px rgba(200, 150, 100, 0.12);
    }
    #recordBtn.recording {
      border-color: rgba(255, 120, 120, 0.55);
      color: rgba(255, 160, 150, 0.95);
      animation: btnPulse 1.6s ease-in-out infinite;
    }
    #recordBtn.done {
      border-color: rgba(160, 210, 160, 0.45);
      color: rgba(170, 220, 180, 0.85);
    }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 0 0 rgba(255, 100, 100, 0); }
      50% { box-shadow: 0 0 18px rgba(255, 100, 100, 0.25); }
    }

    /* 状态提示 */
    #statusTip {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      padding: 14px 28px;
      border-radius: 20px;
      background: rgba(10, 8, 18, 0.9);
      color: rgba(255, 220, 180, 0.9);
      font-size: 15px;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      pointer-events: none;
      z-index: 200;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      letter-spacing: 0.06em;
    }
    #statusTip.show {
      transform: translate(-50%, -50%) scale(1);
    }
  </style>
</head>
<body onclick="initAudio()">

<div id="canvas-container"></div>
<button id="recordBtn" onclick="toggleRecording()">🎬 录制完整循环</button>
<div id="statusTip"></div>

<script>
// ============================================================
//  盛开的郁金香 — 竖屏 · 自动录循环 · 弯月→圆月
//  技法：p5.js · 贝塞尔曲线 · 粒子系统 · Perlin 噪声
// ============================================================

// ----- 画布尺寸（竖屏 9:16 风格）-----
const CV_W = 500;
const CV_H = 850;

// ----- 全局状态 -----
let flowerCX, flowerCY;
let stemBaseY;
let bloomStart;
const BLOOM_DURATION = 4000;
let bgParticles = [];
let dewDrops = [];
let splashParticles = [];
let sparkles = [];
let ripples = [];
let moonPhase = 0;
let totalDropsLanded = 0;
let moonFullTime = 0;
const DROPS_FOR_FULL_MOON = 8;
const MOON_FULL_PAUSE = 3500;

// ----- 水滩参数 -----
let puddleY, puddleW, puddleH;

// ----- 录制 -----
let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;
let pendingStop = false;
let cycleCompleted = false;
let bloomChimePlayed = false;   // 开花音效是否已播放

// ----- 音频 -----
let audioCtx = null;
let audioInited = false;

// ============================================================
//  音效系统（Web Audio API 合成，无需外部文件）
// ============================================================
function initAudio() {
  if (audioInited) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioInited = true;
  } catch (e) {
    console.log('音频初始化失败:', e);
  }
}

// 水滴落入水滩 —— 高频→低频快速滑落
function playDropSound() {
  if (!audioCtx || audioCtx.state === 'closed') return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  let now = audioCtx.currentTime;

  // 主音：正弦波从高滑到低
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1400, now);
  osc.frequency.exponentialRampToValueAtTime(280, now + 0.12);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.10, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
  osc.start(now);
  osc.stop(now + 0.2);

  // 泛音：更高频的清脆声响
  let osc2 = audioCtx.createOscillator();
  let gain2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(2400, now);
  osc2.frequency.exponentialRampToValueAtTime(800, now + 0.06);
  osc2.connect(gain2);
  gain2.connect(audioCtx.destination);
  gain2.gain.setValueAtTime(0.05, now);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  osc2.start(now);
  osc2.stop(now + 0.1);
}

// 月圆 —— 温暖的和弦泛音
function playMoonFullChime() {
  if (!audioCtx || audioCtx.state === 'closed') return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  let now = audioCtx.currentTime;
  let freqs = [261.6, 329.6, 392.0, 523.3]; // C4 E4 G4 C5

  freqs.forEach((freq, i) => {
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    let t = now + i * 0.18;
    gain.gain.setValueAtTime(0.07, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
    osc.start(t);
    osc.stop(t + 2.8);
  });
}

// 月相重置 —— 轻柔的下行滑音
function playMoonResetSound() {
  if (!audioCtx || audioCtx.state === 'closed') return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  let now = audioCtx.currentTime;

  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(520, now);
  osc.frequency.exponentialRampToValueAtTime(200, now + 0.7);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.06, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
  osc.start(now);
  osc.stop(now + 1.0);
}

// 开花 —— 轻巧的叮咚
function playBloomChime() {
  if (!audioCtx || audioCtx.state === 'closed') return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  let now = audioCtx.currentTime;
  let freqs = [523.3, 659.3, 784.0]; // C5 E5 G5

  freqs.forEach((freq, i) => {
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    let t = now + i * 0.22;
    gain.gain.setValueAtTime(0.06, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
    osc.start(t);
    osc.stop(t + 1.6);
  });
}

// ----- 花朵参数 -----
const PETAL_COUNT = 5;
const petalDefs = [
  { angle: -0.85, bloomMult: 1.05, isBack: true  },
  { angle:  0.85, bloomMult: 1.05, isBack: true  },
  { angle: -0.35, bloomMult: 0.95, isBack: false },
  { angle:  0.00, bloomMult: 0.85, isBack: false },
  { angle:  0.35, bloomMult: 0.95, isBack: false },
];

// ============================================================
//  p5.js 入口
// ============================================================
function setup() {
  let c = createCanvas(CV_W, CV_H);
  c.parent('canvas-container');

  flowerCX = CV_W * 0.5;
  flowerCY = CV_H * 0.30;
  stemBaseY = CV_H * 0.72;
  puddleY = stemBaseY + 32;
  puddleW = CV_W * 0.32;
  puddleH = puddleW * 0.28;
  bloomStart = millis();

  for (let i = 0; i < 80; i++) bgParticles.push(new BGParticle());

  for (let i = 0; i < 3; i++) {
    let d = new DewDrop();
    d.waitTimer = 1500 + i * 2500;
    dewDrops.push(d);
  }
  for (let i = 0; i < 20; i++) sparkles.push(new Sparkle());
}

function draw() {
  background(6, 6, 15);

  let now = millis();
  let elapsed = now - bloomStart;

  // ----- 开花进度 -----
  let raw = constrain(elapsed / BLOOM_DURATION, 0, 1);
  let bloom = 1 - pow(1 - raw, 3);
  if (raw >= 1) {
    let breath = sin(elapsed * 0.0008) * 0.025;
    bloom = constrain(1 + breath, 0, 1.05);

    // 开花音效（只播一次）
    if (!bloomChimePlayed) {
      bloomChimePlayed = true;
      playBloomChime();
    }
  }

  let stemSway = calculateStemSway(now);

  // ----- 绘制顺序（远 → 近）-----
  drawVignette();
  updateAndDrawBgParticles(now);
  drawGroundShadow();
  drawPuddle(now);
  updateAndDrawRipples();
  drawMoonReflection();
  drawStem(stemSway);
  drawLeaves(stemSway, bloom);
  drawPetals(bloom, stemSway, now);
  drawFlowerCenterGlow(bloom);
  updateAndDrawDewdrops(bloom, stemSway, now);
  updateAndDrawSplashParticles();
  updateAndDrawSparkles(bloom, now);

  // 月圆之后的微光
  if (moonPhase >= 0.95) drawFullMoonAura(now);

  // ----- 月圆 → 停留 → 重置循环 -----
  if (moonPhase >= 0.99 && moonFullTime === 0) {
    moonFullTime = now;
    playMoonFullChime();  // 月圆音效
  }
  if (moonFullTime > 0 && now - moonFullTime > MOON_FULL_PAUSE) {
    moonPhase = 0;
    totalDropsLanded = 0;
    moonFullTime = 0;
    ripples = [];
    bloomChimePlayed = false; // 下一轮可重新触发开花音效

    playMoonResetSound();     // 月相重置音效

    cycleCompleted = true;

    // 如果正在录制 → 触发停止
    if (isRecording) {
      pendingStop = true;
    }
  }

  // ----- 延迟停止录制（在 draw 末尾执行，避免干扰渲染）-----
  if (pendingStop) {
    pendingStop = false;
    stopRecording();
  }
}

// ============================================================
//  鼠标 → 茎的摇摆量
// ============================================================
function calculateStemSway(now) {
  let mx = constrain(mouseX, 0, CV_W);
  let mouseInfluence = (mx - flowerCX) / (CV_W * 0.5);
  mouseInfluence = constrain(mouseInfluence, -1, 1) * 0.6;
  let wind = noise(now * 0.0003) * 2 - 1;
  wind *= 0.4;
  return mouseInfluence * 14 + wind * 10;
}

// ============================================================
//  暗角
// ============================================================
function drawVignette() {
  let grd = drawingContext.createRadialGradient(
    flowerCX, flowerCY, CV_H * 0.08,
    flowerCX, flowerCY, CV_H * 0.9
  );
  grd.addColorStop(0, 'rgba(12,10,20,0)');
  grd.addColorStop(0.5, 'rgba(8,6,14,0.3)');
  grd.addColorStop(1, 'rgba(3,2,8,0.7)');
  drawingContext.fillStyle = grd;
  drawingContext.fillRect(0, 0, CV_W, CV_H);
}

// ============================================================
//  地面阴影
// ============================================================
function drawGroundShadow() {
  noStroke();
  for (let i = 3; i >= 0; i--) {
    let r = puddleW * 0.5 + i * 14;
    let h = puddleH * 0.5 + i * 4;
    fill(4, 4, 10, 40 - i * 10);
    ellipse(flowerCX, puddleY + 4, r * 2, h * 2);
  }
}

// ============================================================
//  水滩
// ============================================================
function drawPuddle(now) {
  let px = flowerCX;
  let py = puddleY;

  fill(12, 14, 24, 210);
  stroke(35, 42, 60, 90);
  strokeWeight(1);
  ellipse(px, py, puddleW, puddleH);

  noStroke();
  fill(25, 30, 50, 80);
  ellipse(px, py - 2, puddleW * 0.85, puddleH * 0.6);

  fill(60, 80, 120, 25);
  ellipse(px - puddleW * 0.1, py - puddleH * 0.2, puddleW * 0.5, puddleH * 0.4);

  let wave = noise(now * 0.001) * 2 - 1;
  fill(20, 25, 42, 50);
  ellipse(px + wave * 3, py + 1, puddleW * 0.7, puddleH * 0.45);
}

// ============================================================
//  涟漪
// ============================================================
function updateAndDrawRipples() {
  for (let i = ripples.length - 1; i >= 0; i--) {
    let rp = ripples[i];
    rp.radius += 0.5;
    rp.opacity *= 0.94;

    if (rp.opacity < 0.02) {
      ripples.splice(i, 1);
      continue;
    }

    noFill();
    let a = rp.opacity * 150;
    stroke(120, 150, 190, a);
    strokeWeight(0.7);
    ellipse(rp.x, rp.y, rp.radius * 2, rp.radius * 2 * 0.3);
  }
}

// ============================================================
//  月亮倒影 — 弯月 → 圆月（双圆交叠法）
// ============================================================
function drawMoonReflection() {
  let mx = flowerCX + puddleW * 0.04;
  let my = puddleY;
  let moonR = puddleW * 0.18;
  let phase = moonPhase;

  // 月亮光晕
  noStroke();
  for (let i = 3; i >= 0; i--) {
    let gr = moonR + i * 5 + phase * 7;
    let ga = (0.06 + phase * 0.14) / (i + 1);
    fill(255, 230, 180, ga * 255);
    ellipse(mx, my, gr * 2, gr * 2 * 0.7);
  }

  if (phase < 0.97) {
    // 弯月：明亮圆 + 水滩色遮挡圆
    // 遮挡圆心 = mx - R*(0.25 + phase*2.2)
    // phase=0 → 极细弯月(右侧12%可见) → phase≈0.77 → 圆月
    let shadowX = mx - moonR * (0.25 + phase * 2.2);

    fill(255, 240, 200, 150 + phase * 80);
    noStroke();
    ellipse(mx, my, moonR * 2, moonR * 2 * 0.65);

    fill(12, 14, 24);
    noStroke();
    ellipse(shadowX, my, moonR * 2.1, moonR * 2 * 0.7);
  } else {
    fill(255, 240, 200, 150 + phase * 80);
    noStroke();
    ellipse(mx, my, moonR * 2, moonR * 2 * 0.65);
  }

  // 水面反光
  noStroke();
  for (let i = 2; i >= 0; i--) {
    let ry = my + moonR * 0.5 + i * 5;
    let ra = (0.08 + phase * 0.06) / (i + 1.5);
    fill(255, 235, 190, ra * 255);
    ellipse(mx, ry, moonR * 0.8 - i * 4, moonR * 0.2);
  }
}

// ============================================================
//  月圆后的全域微光
// ============================================================
function drawFullMoonAura(now) {
  let intensity = constrain((moonPhase - 0.95) * 20, 0, 0.4);
  let pulse = sin(now * 0.002) * 0.3 + 0.7;

  noStroke();
  for (let i = 3; i >= 0; i--) {
    let r = puddleW * 0.3 + i * 25;
    let a = intensity * pulse * (0.06 / (i + 1));
    fill(255, 225, 160, a * 255);
    ellipse(flowerCX, puddleY, r * 2, r * 2 * 0.4);
  }
}

// ============================================================
//  茎（加长适配竖屏）
// ============================================================
function drawStem(sway) {
  noFill();
  let topX = flowerCX + sway * 0.6;
  let topY = flowerCY;
  let stemCPx = flowerCX + sway * 0.3;
  let stemCPy = (topY + stemBaseY) * 0.5;

  for (let i = 0; i < 3; i++) {
    let offset = (i - 1) * 1.5;
    stroke(140, 175, 130, 100 - i * 25);
    strokeWeight(1.8 - i * 0.4);
    beginShape();
    vertex(topX + offset, topY);
    bezierVertex(
      stemCPx + offset, stemCPy - 30,
      stemCPx + offset, stemCPy + 30,
      flowerCX + offset, stemBaseY
    );
    endShape();
  }
}

// ============================================================
//  叶子
// ============================================================
function drawLeaves(sway, bloom) {
  noFill();
  let leafOriginY = flowerCY + (stemBaseY - flowerCY) * 0.5;
  let leafOriginX = flowerCX + sway * 0.5;

  let leafAlpha = constrain(map(bloom, 0.2, 0.7, 0, 1), 0, 1);
  if (leafAlpha <= 0) return;

  let leafLen = CV_H * 0.16 * bloom;

  drawSingleLeaf(leafOriginX, leafOriginY, -1, leafLen, leafAlpha);
  drawSingleLeaf(leafOriginX, leafOriginY + 15, 1, leafLen * 0.85, leafAlpha * 0.8);
}

function drawSingleLeaf(ox, oy, dir, length, alpha) {
  let tipX = ox + dir * length * 0.7;
  let tipY = oy - length * 0.5;
  let cp1x = ox + dir * length * 0.15;
  let cp1y = oy - length * 0.35;
  let cp2x = ox + dir * length * 0.5;
  let cp2y = oy - length * 0.6;

  stroke(130, 170, 120, 90 * alpha);
  strokeWeight(1.2);
  beginShape();
  vertex(ox, oy);
  bezierVertex(cp1x, cp1y, cp2x, cp2y, tipX, tipY);
  endShape();

  stroke(150, 185, 140, 60 * alpha);
  strokeWeight(0.6);
  let mvx = (ox + tipX) / 2;
  let mvy = (oy + tipY) / 2;
  line(ox, oy, mvx, mvy);
}

// ============================================================
//  花瓣
// ============================================================
function drawPetals(bloom, sway, now) {
  let cx = flowerCX + sway * 0.4;
  let cy = flowerCY;
  let petalLen = CV_H * 0.18;
  let petalWid = CV_W * 0.06;

  let sorted = [...petalDefs].sort((a, b) => {
    if (a.isBack && !b.isBack) return -1;
    if (!a.isBack && b.isBack) return 1;
    return 0;
  });

  for (let pd of sorted) {
    let effectiveAngle = pd.angle * bloom * pd.bloomMult;
    let len = petalLen * bloom * pd.bloomMult;
    let wid = petalWid * bloom * pd.bloomMult;
    let n = noise(now * 0.002 + pd.angle * 5) * 2 - 1;
    effectiveAngle += n * 0.03;
    drawOnePetal(cx, cy, effectiveAngle, len, wid, pd.isBack, bloom);
  }
}

function drawOnePetal(cx, cy, angle, length, width, isBack, bloom) {
  let tipX = cx + sin(angle) * length;
  let tipY = cy - cos(angle) * length;

  let baseHalfW = width * 0.25;
  let blx = cx + sin(angle - HALF_PI) * baseHalfW;
  let bly = cy - cos(angle - HALF_PI) * baseHalfW;
  let brx = cx + sin(angle + HALF_PI) * baseHalfW;
  let bry = cy - cos(angle + HALF_PI) * baseHalfW;

  let spread = width * 0.8;
  let cplx = cx + sin(angle - 0.55) * length * 0.35;
  let cply = cy - cos(angle - 0.55) * length * 0.4;
  let cp2lx = tipX + sin(angle - HALF_PI) * spread * 0.3;
  let cp2ly = tipY + cos(angle) * length * 0.25;

  let cprx = cx + sin(angle + 0.55) * length * 0.35;
  let cpry = cy - cos(angle + 0.55) * length * 0.4;
  let cp2rx = tipX + sin(angle + HALF_PI) * spread * 0.3;
  let cp2ry = tipY + cos(angle) * length * 0.25;

  let fillAlpha = isBack ? 8 : 18;
  fill(225, 170, 150, fillAlpha);
  stroke(255, 220, 190, isBack ? 120 : 200);
  strokeWeight(isBack ? 0.8 : 1.3);

  beginShape();
  vertex(blx, bly);
  bezierVertex(cplx, cply, cp2lx, cp2ly, tipX, tipY);
  bezierVertex(cp2rx, cp2ry, cprx, cpry, brx, bry);
  endShape(CLOSE);

  if (!isBack && bloom > 0.5) {
    let detailAlpha = map(bloom, 0.5, 1, 0, 80);
    stroke(255, 200, 170, detailAlpha);
    strokeWeight(0.5);
    let midTipX = cx + sin(angle) * length * 0.7;
    let midTipY = cy - cos(angle) * length * 0.7;
    line(cx, cy, midTipX, midTipY);
  }
}

// ============================================================
//  花心光晕
// ============================================================
function drawFlowerCenterGlow(bloom) {
  if (bloom < 0.3) return;
  let alpha = map(bloom, 0.3, 1, 0, 1);

  noStroke();
  for (let i = 4; i >= 0; i--) {
    let r = 14 + i * 9;
    let a = alpha * (0.12 / (i + 1));
    fill(255, 200, 140, a * 255);
    ellipse(flowerCX, flowerCY, r * 2, r * 2);
  }
}

// ============================================================
//  背景流动粒子
// ============================================================
class BGParticle {
  constructor() { this.reset(); }
  reset() {
    this.x = random(CV_W);
    this.y = random(CV_H);
    this.size = random(0.8, 2.5);
    this.alpha = random(15, 50);
    this.noiseSeed = random(1000);
  }
  update(now) {
    let nx = noise(this.noiseSeed + now * 0.0004, this.y * 0.003);
    let ny = noise(this.noiseSeed + 300 + now * 0.0004, this.x * 0.003);
    this.x += (nx - 0.5) * 0.6;
    this.y += (ny - 0.5) * 0.6 - 0.15;

    let d = dist(this.x, this.y, mouseX, mouseY);
    if (d < 160) {
      let ang = atan2(this.y - mouseY, this.x - mouseX);
      let force = map(d, 0, 160, 1.0, 0);
      this.x += cos(ang) * force;
      this.y += sin(ang) * force;
    }

    if (this.x < -20) this.x = CV_W + 20;
    if (this.x > CV_W + 20) this.x = -20;
    if (this.y < -20) this.y = CV_H + 20;
    if (this.y > CV_H + 20) this.y = -20;
  }
  draw() {
    noStroke();
    fill(200, 180, 150, this.alpha);
    ellipse(this.x, this.y, this.size, this.size);
  }
}

function updateAndDrawBgParticles(now) {
  for (let p of bgParticles) { p.update(now); p.draw(); }

  for (let i = 0; i < bgParticles.length; i += 3) {
    for (let j = i + 1; j < bgParticles.length; j += 3) {
      let d = dist(bgParticles[i].x, bgParticles[i].y, bgParticles[j].x, bgParticles[j].y);
      if (d < 55) {
        let a = map(d, 0, 55, 25, 0);
        stroke(180, 160, 140, a);
        strokeWeight(0.3);
        line(bgParticles[i].x, bgParticles[i].y, bgParticles[j].x, bgParticles[j].y);
      }
    }
  }
}

// ============================================================
//  露珠系统
// ============================================================
class DewDrop {
  constructor() {
    this.phase = 'waiting';
    this.waitTimer = random(2000, 5000);
    this.waitStart = 0;
    this.petalIndex = floor(random(PETAL_COUNT));
    this.t = random(0.15, 0.5);
    this.x = 0; this.y = 0;
    this.radius = 0;
    this.targetRadius = random(2.5, 5.5);
    this.formSpeed = 0.03;
    this.maxOpacity = random(0.7, 0.95);
    this.slideSpeed = random(0.002, 0.005);
    this.vy = 0; this.vx = 0;
    this.opacity = 1;
    this.trailPositions = [];
    this.landedTime = 0;
  }

  getPositionOnPetal(bloom, sway) {
    let pd = petalDefs[this.petalIndex];
    let effectiveAngle = pd.angle * bloom * pd.bloomMult;
    let length = CV_H * 0.18 * bloom * pd.bloomMult;
    let cx = flowerCX + sway * 0.4;
    let cy = flowerCY;

    let tipX = cx + sin(effectiveAngle) * length;
    let tipY = cy - cos(effectiveAngle) * length;
    return {
      x: lerp(cx, tipX, 1 - this.t),
      y: lerp(cy, tipY, 1 - this.t),
    };
  }

  update(bloom, sway, now) {
    if (bloom < 0.5) return;

    switch (this.phase) {
      case 'waiting':
        if (this.waitStart === 0) this.waitStart = now;
        if (now - this.waitStart > this.waitTimer) this.phase = 'forming';
        break;

      case 'forming':
        this.radius += this.formSpeed;
        let pos = this.getPositionOnPetal(bloom, sway);
        this.x = pos.x; this.y = pos.y;
        if (this.radius >= this.targetRadius) {
          this.radius = this.targetRadius;
          this.phase = 'ready';
          this.readyStart = now;
        }
        break;

      case 'ready':
        this.t += this.slideSpeed * 0.3;
        let rpos = this.getPositionOnPetal(bloom, sway);
        this.x = rpos.x; this.y = rpos.y;
        if (now - this.readyStart > 600) {
          this.phase = 'sliding';
          this.trailPositions = [];
        }
        break;

      case 'sliding':
        this.t += this.slideSpeed;
        let spos = this.getPositionOnPetal(bloom, sway);
        this.trailPositions.push({ x: this.x, y: this.y, a: 0.6 });
        if (this.trailPositions.length > 12) this.trailPositions.shift();
        for (let tp of this.trailPositions) tp.a *= 0.85;
        this.x = spos.x; this.y = spos.y;

        if (this.t >= 0.95) {
          this.phase = 'falling';
          this.vy = 0.3;
          this.vx = (flowerCX - this.x) * 0.015;
        }
        break;

      case 'falling':
        this.vy += 0.22;
        this.y += this.vy;
        this.vx += (flowerCX - this.x) * 0.003;
        this.x += this.vx;
        this.trailPositions.push({ x: this.x, y: this.y, a: 0.5 });
        if (this.trailPositions.length > 8) this.trailPositions.shift();
        for (let tp of this.trailPositions) tp.a *= 0.8;

        if (this.y >= puddleY - 6) {
          this.phase = 'landing';
          this.landedTime = now;
          this.x = flowerCX + random(-puddleW * 0.2, puddleW * 0.2);
          this.y = puddleY + random(-2, 2);
          this.onLandInPuddle();
        }
        break;

      case 'landing':
        this.opacity *= 0.88;
        this.radius *= 0.96;
        if (now - this.landedTime > 800) this.reset(now);
        break;
    }
  }

  onLandInPuddle() {
    playDropSound();  // 水滴音效

    let rippleCount = floor(random(3, 6));
    for (let i = 0; i < rippleCount; i++) {
      ripples.push({
        x: this.x + random(-6, 6),
        y: this.y + random(-3, 3),
        radius: random(2, 6),
        opacity: random(0.5, 0.9),
      });
    }

    for (let i = 0; i < 10; i++) {
      splashParticles.push({
        x: this.x, y: this.y,
        vx: random(-2.5, 2.5),
        vy: random(-3.5, -0.5),
        life: 1, decay: random(0.03, 0.08),
        size: random(0.8, 2.5),
      });
    }

    totalDropsLanded++;
    moonPhase = constrain(totalDropsLanded / DROPS_FOR_FULL_MOON, 0, 1);
  }

  reset(now) {
    this.phase = 'waiting';
    this.waitStart = now;
    this.waitTimer = random(2500, 6000);
    this.petalIndex = floor(random(PETAL_COUNT));
    this.t = random(0.15, 0.5);
    this.radius = 0; this.opacity = 1;
    this.vy = 0; this.vx = 0;
    this.trailPositions = [];
  }

  draw(bloom) {
    if (bloom < 0.5 || this.phase === 'waiting') return;
    let a = this.opacity * this.maxOpacity * 255;

    noFill();
    for (let tp of this.trailPositions) {
      stroke(180, 210, 240, tp.a * a);
      strokeWeight(1);
      point(tp.x, tp.y);
    }

    noStroke();
    for (let i = 3; i >= 0; i--) {
      let r = this.radius + i * 3;
      let ga = a * (0.15 / (i + 2));
      fill(190, 220, 250, ga);
      ellipse(this.x, this.y, r * 2, r * 2);
    }

    fill(210, 235, 255, a * 0.85);
    noStroke();
    ellipse(this.x, this.y, this.radius * 2, this.radius * 2);

    fill(255, 255, 255, a * 1.1);
    let hx = this.x - this.radius * 0.3;
    let hy = this.y - this.radius * 0.35;
    ellipse(hx, hy, this.radius * 0.5, this.radius * 0.5);
  }
}

function updateAndDrawDewdrops(bloom, sway, now) {
  for (let d of dewDrops) {
    d.update(bloom, sway, now);
    d.draw(bloom);
  }
}

// ============================================================
//  溅射粒子
// ============================================================
function updateAndDrawSplashParticles() {
  for (let i = splashParticles.length - 1; i >= 0; i--) {
    let sp = splashParticles[i];
    sp.x += sp.vx; sp.y += sp.vy;
    sp.vy += 0.08;
    sp.life -= sp.decay;
    if (sp.life <= 0) { splashParticles.splice(i, 1); continue; }
    noStroke();
    fill(180, 210, 240, sp.life * 180);
    ellipse(sp.x, sp.y, sp.size, sp.size);
  }
}

// ============================================================
//  花粉 / 闪光粒子
// ============================================================
class Sparkle {
  constructor() { this.reset(); }
  reset() {
    let ang = random(TWO_PI);
    let d = random(20, 110);
    this.x = flowerCX + cos(ang) * d;
    this.y = flowerCY + sin(ang) * d - d * 0.3;
    this.size = random(0.5, 2);
    this.alpha = random(0.3, 1);
    this.phase = random(TWO_PI);
    this.speed = random(0.02, 0.06);
    this.floatSpeed = random(0.3, 0.8);
  }
  update(now) {
    this.alpha = 0.3 + sin(now * 0.003 * this.speed + this.phase) * 0.5 + 0.5;
    this.y -= this.floatSpeed * 0.3;
    this.x += sin(now * 0.002 + this.phase) * 0.3;
    if (dist(this.x, this.y, flowerCX, flowerCY) > 150) {
      this.reset();
      this.y = flowerCY - random(0, 90);
    }
  }
  draw() {
    noStroke();
    fill(255, 220, 170, this.alpha * 200);
    ellipse(this.x, this.y, this.size, this.size);
  }
}

function updateAndDrawSparkles(bloom, now) {
  if (bloom < 0.5) return;
  if (sparkles.length < 30 && random() < 0.3) sparkles.push(new Sparkle());
  if (sparkles.length > 45) sparkles.splice(0, sparkles.length - 45);
  for (let s of sparkles) { s.update(now); s.draw(); }
}

// ============================================================
//  录制功能
// ============================================================
function resetAnimation() {
  bloomStart = millis();
  moonPhase = 0;
  totalDropsLanded = 0;
  moonFullTime = 0;
  cycleCompleted = false;
  ripples = [];
  splashParticles = [];
  dewDrops = [];
  for (let i = 0; i < 3; i++) {
    let d = new DewDrop();
    d.waitTimer = 1500 + i * 2500;
    dewDrops.push(d);
  }
}

function showTip(msg, duration = 1200) {
  let tip = document.getElementById('statusTip');
  tip.textContent = msg;
  tip.classList.add('show');
  clearTimeout(tip._timeout);
  tip._timeout = setTimeout(() => tip.classList.remove('show'), duration);
}

function toggleRecording() {
  initAudio(); // 确保音频上下文已激活

  let btn = document.getElementById('recordBtn');

  if (isRecording) {
    // 手动停止（不常用）
    stopRecording();
    return;
  }

  // 开始录制 — 先重置动画
  resetAnimation();

  let canvasEl = document.querySelector('canvas');
  if (!canvasEl) { alert('画布未就绪，请刷新页面'); return; }

  let stream = canvasEl.captureStream(60);

  // 选择编码器
  let mimeType = 'video/webm;codecs=vp9';
  if (!MediaRecorder.isTypeSupported(mimeType)) {
    mimeType = 'video/webm;codecs=vp8';
  }
  if (!MediaRecorder.isTypeSupported(mimeType)) {
    mimeType = 'video/webm';
  }

  recordedChunks = [];
  mediaRecorder = new MediaRecorder(stream, {
    mimeType: mimeType,
    videoBitsPerSecond: 8000000,  // 8 Mbps，保证画质
  });

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) recordedChunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    let blob = new Blob(recordedChunks, { type: mimeType });
    let url = URL.createObjectURL(blob);

    // 自动下载
    let ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    let a = document.createElement('a');
    a.href = url;
    a.download = `blooming-tulip-${ts}.webm`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    // 恢复按钮状态
    btn.textContent = '🎬 录制完整循环';
    btn.classList.remove('recording', 'done');
    isRecording = false;
    mediaRecorder = null;

    showTip('✅ 视频已保存');
  };

  mediaRecorder.start();
  isRecording = true;

  btn.textContent = '⏺ 录制中…';
  btn.classList.add('recording');
  btn.classList.remove('done');

  showTip('🎬 开始录制 · 完整循环约 35 秒');
}

function stopRecording() {
  if (!mediaRecorder || mediaRecorder.state === 'inactive') return;

  let btn = document.getElementById('recordBtn');
  btn.textContent = '💾 正在保存…';
  btn.classList.remove('recording');
  btn.classList.add('done');

  mediaRecorder.stop();
}
